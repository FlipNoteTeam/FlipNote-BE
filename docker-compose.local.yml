services:
  flipnote-mysql:
    image: mysql:latest
    container_name: flipnote-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_USERNAME: root
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flipnote
      TZ: Asia/Seoul

  flipnote-redis:
    image: redis:latest
    container_name: flipnote-redis
    ports:
      - "6379:6379"
