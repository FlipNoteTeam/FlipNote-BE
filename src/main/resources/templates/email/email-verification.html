<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이메일 인증</title>
    <style>
        body {
            background: #f7f7f7;
            font-family: 'Pretendard', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 420px;
            margin: 40px auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px #0001;
            padding: 32px 24px;
        }

        .title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #222;
            margin-bottom: 12px;
            text-align: center;
        }

        .desc {
            color: #555;
            font-size: 1rem;
            margin-bottom: 24px;
            text-align: center;
        }

        .code {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: #2d8cf0;
            background: #f0f6ff;
            border-radius: 8px;
            padding: 12px 0;
            text-align: center;
            margin-bottom: 24px;
        }

        .footer {
            color: #aaa;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 32px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="title">이메일 인증번호 안내</div>
    <div class="desc">
        아래 인증번호를 입력해 주세요.<br>
        <b>인증번호는 <span th:text="${validMinutes}"></span>분간 유효합니다.</b>
    </div>
    <div class="code" th:text="${code}">123456</div>
    <div class="footer">
        본 메일은 발신 전용입니다.<br>
        문의: support@yourdomain.com
    </div>
</div>
</body>
</html>
