spring:
  application:
    name: flipnote

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 50
          batch_versioned_data: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      port: ${SPRING_DATA_REDIS_PORT}

management:
  endpoints:
    web:
      exposure:
        include:
          - health

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    access-token-expiration: 1h
    refresh-token-expiration: 7d

  async:
    core-pool-size: 4
    max-pool-size: 10
    queue-capacity: 100

  resend:
    api-key: ${APP_RESEND_API_KEY}
    from-email: FlipNote <no-reply@flipnote.site>

  encryption:
    key: ${APP_ENCRYPTION_KEY}

  client:
    url: ${APP_CLIENT_URL:https://flipnote.site}
    paths:
      password-reset: /password-reset
      social-link-success: /social-link/success
      social-link-failure: /social-link/failure
      social-link-conflict: /social-link/conflict
      social-login-success: /social-login/success
      social-login-failure: /social-login/failure

  oauth2:
    providers:
      google:
        client-id: ${GOOGLE_CLIENT_ID}
        client-secret: ${GOOGLE_CLIENT_SECRET}
        redirect-uri: "/oauth2/callback/google"
        authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
        token-uri: https://oauth2.googleapis.com/token
        user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
        scope:
          - email
          - profile

cloud:
  aws:
    region: ${S3_BUCKET_REGION}
    credentials:
      access-key: ${S3_ACCESS_KEY}
      secret-key: ${S3_SECRET_KEY}
    stack:
      auto: false
  s3:
    bucket: ${S3_BUCKET_NAME}

springdoc:
  server:
    url: http://localhost:8080

firebase:


image-clean:
  batch-size: 300
  orphan-grace-minutes: 10
